<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <!-- Warm off-white background (iOS applies its own squircle mask) -->
  <rect width="1024" height="1024" fill="#eae4d8"/>

  <!-- Anatomical grey disc, slightly lower-centered to leave visual room up top -->
  <circle cx="512" cy="540" r="378" fill="#c4bea9" fill-opacity="0.55"/>

  <!-- Skin + subcutaneous block with lobulated top edge -->
  <path d="M 210 298
           Q 238 266 286 286
           Q 326 258 372 284
           Q 418 256 466 286
           Q 512 258 560 286
           Q 608 258 654 284
           Q 700 258 746 286
           Q 790 268 815 298
           L 815 442
           L 210 442 Z"
        fill="#faf3e6"
        stroke="#1d1710"
        stroke-width="9"
        stroke-linejoin="round"/>

  <!-- Pedicle (muscle/tissue stem) - gently narrowing then flaring at the base -->
  <path d="M 410 442
           Q 398 594 430 742
           L 594 742
           Q 626 594 614 442
           Z"
        fill="#faf3e6"
        stroke="#1d1710"
        stroke-width="9"
        stroke-linejoin="round"/>

  <!-- Muscle fiber hint lines (kept minimal - just four strokes) -->
  <path d="M 448 458 Q 434 596 464 726" fill="none" stroke="#b2a592" stroke-width="3" stroke-linecap="round"/>
  <path d="M 482 458 Q 474 596 490 726" fill="none" stroke="#b2a592" stroke-width="3" stroke-linecap="round"/>
  <path d="M 542 458 Q 550 596 534 726" fill="none" stroke="#b2a592" stroke-width="3" stroke-linecap="round"/>
  <path d="M 576 458 Q 590 596 560 726" fill="none" stroke="#b2a592" stroke-width="3" stroke-linecap="round"/>

  <!-- Blood vessel: trunk up from below, bifurcating into the skin block -->
  <path d="M 512 868 L 512 528 Q 510 460 470 422" fill="none" stroke="#821a2a" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M 512 528 Q 514 460 556 422" fill="none" stroke="#821a2a" stroke-width="24" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
